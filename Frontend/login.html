
<!DOCTYPE html>
<html lang='en'>
<head>
<meta charset='UTF-8'>
<title>Login - Medicine Tracker</title>
<link href='https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css'
        rel='stylesheet'>
<style>
    body { background: linear-gradient(135deg, #1A6B3C, #2E75B6);
           min-height: 100vh; display: flex;
           align-items: center; justify-content: center; }
    .card { border-radius: 16px; box-shadow: 0 8px 32px rgba(0,0,0,0.2); }
</style>
</head>
<body>
<div class='card p-4' style='width: 400px;'>
<h3 class='text-center mb-4'>💊 Medicine Tracker</h3>
  {% if error %}
<div class='alert alert-danger'>{{ error }}</div>
  {% endif %}
<ul class='nav nav-tabs mb-3' id='authTabs'>
<li class='nav-item'>
<a class='nav-link active' data-bs-toggle='tab'
         href='#login'>Login</a>
</li>
<li class='nav-item'>
<a class='nav-link' data-bs-toggle='tab'
         href='#register'>Register</a>
</li>
</ul>
<div class='tab-content'>
<div class='tab-pane fade show active' id='login'>
<form method='POST' action='/login'>
<div class='mb-3'>
<label>Email</label>
<input type='email' name='email'
                 class='form-control' required>
</div>
<div class='mb-3'>
<label>Password</label>
<input type='password' name='password'
                 class='form-control' required>
</div>
<button class='btn btn-success w-100'>Login</button>
</form>
</div>
<div class='tab-pane fade' id='register'>
<form method='POST' action='/register'>
<div class='mb-3'>
<label>Full Name</label>
<input type='text' name='name'
                 class='form-control' required>
</div>
<div class='mb-3'>
<label>Email</label>
<input type='email' name='email'
                 class='form-control' required>
</div>
<div class='mb-3'>
<label>Phone</label>
<input type='text' name='phone' class='form-control'>
</div>
<div class='mb-3'>
<label>Password</label>
<input type='password' name='password'
                 class='form-control' required>
</div>
<button class='btn btn-primary w-100'>Register</button>
</form>
</div>
</div>
</div>
<script src='https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js'>
</script>
</body></html>
